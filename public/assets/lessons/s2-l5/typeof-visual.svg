<svg width="580" height="300" viewBox="0 0 580 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How typeof works — one input, three possible outputs</title>
<desc>A variable flows into the typeof operator, which then returns one of three possible type strings: number, string, or boolean.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">TYPEOF</text>

<!-- ── INPUT box ── -->
<rect x="20" y="108" width="140" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="90" y="134" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#0C447C">let variableName</text>
<text x="90" y="152" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#185FA5">= value</text>
<text x="90" y="168" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="9" fill="#4A5068">your variable</text>

<!-- arrow input → typeof -->
<line x1="162" y1="140" x2="196" y2="140" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── TYPEOF centre box ── -->
<rect x="198" y="108" width="154" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="275" y="132" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#633806">typeof</text>
<text x="275" y="150" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#854F0B">variableName</text>
<text x="275" y="165" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="9" fill="#854F0B">checks the type</text>

<!-- ── ARROWS out to three results ── -->
<!-- top arrow → number -->
<path d="M352 128 Q390 128 390 68 L414 68" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- middle arrow → string -->
<line x1="352" y1="140" x2="414" y2="140" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- bottom arrow → boolean -->
<path d="M352 152 Q390 152 390 212 L414 212" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── RESULT: number (teal) ── -->
<rect x="416" y="44" width="144" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<rect x="416" y="66" width="144" height="26" rx="0" fill="#1A1E2E"/>
<rect x="416" y="58" width="144" height="34" rx="8" fill="#1A1E2E"/>
<rect x="416" y="44" width="144" height="24" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<!-- cleaner two-part result boxes -->
<rect x="416" y="44" width="144" height="22" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="488" y="58" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#085041">let score = 42</text>
<rect x="416" y="70" width="144" height="26" rx="8" fill="#1A1E2E"/>
<text x="488" y="83" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#9FE1CB">'number'</text>

<!-- ── RESULT: string (blue) ── -->
<rect x="416" y="118" width="144" height="22" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="488" y="131" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#0C447C">let name = 'Alex'</text>
<rect x="416" y="144" width="144" height="26" rx="8" fill="#1A1E2E"/>
<text x="488" y="157" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#85B7EB">'string'</text>

<!-- ── RESULT: boolean (amber) ── -->
<rect x="416" y="192" width="144" height="22" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="488" y="205" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#633806">let on = true</text>
<rect x="416" y="218" width="144" height="26" rx="8" fill="#1A1E2E"/>
<text x="488" y="231" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#FAC775">'boolean'</text>

<!-- caption -->
<text x="290" y="282" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#8B91A8">typeof always returns a string — the name of the type.</text>

</svg>
