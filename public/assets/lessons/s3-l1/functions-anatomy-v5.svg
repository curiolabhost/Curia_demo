<svg width="580" height="380" viewBox="0 0 580 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Anatomy of a JavaScript function</title>
<desc>A labeled diagram showing the parts of a function: the function keyword, the name, the parentheses, and the body enclosed in curly braces.</desc>
<defs>
  <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── OUTER FUNCTION BOX ── -->
<rect x="120" y="110" width="360" height="160" rx="10" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 3"/>

<!-- FUNCTION label tag -->
<rect x="120" y="96" width="82" height="22" rx="6" fill="#1D9E75"/>
<text x="161" y="111" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" letter-spacing="0.04em">FUNCTION</text>

<!-- ── CODE LINE 1: function greetPlayer() { ── -->
<!-- function keyword box -->
<rect x="136" y="130" width="94" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="183" y="145" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="600" fill="#3C3489">function</text>

<!-- greetPlayer() box -->
<rect x="238" y="130" width="124" height="30" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="300" y="145" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="600" fill="#085041">greetPlayer()</text>

<!-- { -->
<text x="370" y="145" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#888780">{</text>

<!-- ── BODY BOX ── -->
<rect x="136" y="172" width="324" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="298" y="194" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#633806">console.log('Welcome!');</text>

<!-- } -->
<text x="136" y="242" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#888780">}</text>

<!-- ── LABEL: function keyword — left of dashed box ── -->
<text x="12" y="136" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#3C3489">function</text>
<text x="12" y="152" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#3C3489">keyword</text>
<text x="12" y="170" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">tells JS you're</text>
<text x="12" y="184" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">making a block</text>
<!-- straight arrow → keyword box left edge -->
<line x1="108" y1="149" x2="134" y2="145" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

<!-- ── LABEL: function name — top right ── -->
<text x="390" y="58" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#085041">name</text>
<text x="390" y="74" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">how you call it later</text>
<text x="390" y="88" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">you choose the name</text>
<!-- arrow → right edge of greetPlayer() box -->
<line x1="420" y1="92" x2="362" y2="128" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-teal)"/>

<!-- ── LABEL: body ── -->
<text x="490" y="186" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#633806">body</text>
<text x="490" y="202" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">the code that runs</text>
<text x="490" y="216" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">every time it's called</text>
<!-- arrow → body box -->
<line x1="488" y1="194" x2="462" y2="194" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arr-amber)"/>

<!-- ── CALLING THE FUNCTION ── -->
<text x="40" y="296" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#185FA5" letter-spacing="0.06em">CALLING IT</text>

<rect x="40" y="306" width="500" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="60" y="332" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#85B7EB">greetPlayer</text>
<text x="151" y="332" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#C2C0B6">();</text>
<text x="200" y="332" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#4A5068">— runs the body every time you write this</text>

<!-- caption -->
<text x="290" y="368" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#8B91A8">Define it once. Call it as many times as you need.</text>

</svg>
