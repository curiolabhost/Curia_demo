<svg width="100%" viewBox="0 0 680 430" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Using variables to do math</title>
<desc>Four step flowchart: declare variables with let, store numbers in them, use them in a math expression, then log the result</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="180" y="30" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="55" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#3C3489">Declare a variable</text>
<text x="340" y="74" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#534AB7">give it a name using let</text>
<text x="516" y="52" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#534AB7">let price = 20;</text>
<text x="516" y="70" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#534AB7">let tax = 2;</text>

<line x1="340" y1="86" x2="340" y2="116" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="180" y="120" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="145" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#0C447C">Variables now hold numbers</text>
<text x="340" y="164" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#185FA5">price = 20,  tax = 2</text>
<rect x="516" y="122" width="60" height="28" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="546" y="131" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#0C447C">price</text>
<text x="546" y="145" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#0C447C">20</text>
<rect x="584" y="122" width="56" height="28" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="612" y="131" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#0C447C">tax</text>
<text x="612" y="145" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#0C447C">2</text>

<line x1="340" y1="176" x2="340" y2="206" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="180" y="210" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="235" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#633806">Use them in math</text>
<text x="340" y="254" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#854F0B">JavaScript reads the values and calculates</text>
<text x="516" y="236" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#633806">let total =</text>
<text x="516" y="254" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#633806">  price + tax;</text>

<line x1="340" y1="266" x2="340" y2="296" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="180" y="300" width="320" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="340" y="325" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#27500A">Store and show the result</text>
<text x="340" y="344" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#3B6D11">total = 22 — print it to the console</text>
<text x="516" y="326" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#27500A">console.log(total);</text>
<text x="516" y="344" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#27500A">// prints: 22</text>

<rect x="180" y="374" width="320" height="36" rx="6" fill="#1A1E2E"/>
<text x="340" y="397" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="15" font-weight="600" fill="white">22</text>

<text x="164" y="60" text-anchor="end" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#534AB7">step 1</text>
<text x="164" y="150" text-anchor="end" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#185FA5">step 2</text>
<text x="164" y="240" text-anchor="end" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#633806">step 3</text>
<text x="164" y="330" text-anchor="end" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#27500A">step 4</text>
</svg>
