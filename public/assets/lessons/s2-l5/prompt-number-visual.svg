<svg width="580" height="310" viewBox="0 0 580 310" role="img" xmlns="http://www.w3.org/2000/svg">
<title>What happens when prompting for a number</title>
<desc>Two rows comparing prompt() which returns a string versus Number(prompt()) which returns a real number ready for math.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">PROMPTING FOR A NUMBER</text>

<!-- ══ ROW 1: prompt() only ══ -->
<text x="40" y="50" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#993C1D" letter-spacing="0.05em">WITHOUT NUMBER()</text>

<!-- code box -->
<rect x="40" y="58" width="500" height="36" rx="8" fill="#1A1E2E"/>
<text x="60" y="80" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#AFA9EC">let </text>
<text x="84" y="80" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#85B7EB">age </text>
<text x="114" y="80" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">= </text>
<text x="130" y="80" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#FAC775">prompt</text>
<text x="178" y="80" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">(</text>
<text x="186" y="80" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#9FE1CB">'How old are you?'</text>
<text x="340" y="80" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">)</text>

<!-- flow: user types → gets back -->
<rect x="40" y="104" width="110" height="52" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="95" y="126" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">user types</text>
<text x="95" y="146" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#2C2C2A">13</text>

<line x1="152" y1="130" x2="178" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="180" y="104" width="110" height="52" rx="8" fill="#1A1E2E"/>
<text x="235" y="126" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#9C9A92">age contains</text>
<text x="235" y="146" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#D85A30">'13'</text>

<line x1="292" y1="130" x2="318" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="320" y="104" width="220" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="430" y="120" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#993C1D">math breaks</text>
<text x="430" y="138" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#712B13">'13' + 1  =  '131'</text>
<text x="430" y="152" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#993C1D">joined, not added</text>

<!-- ══ ROW 2: Number(prompt()) ══ -->
<text x="40" y="186" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#0F6E56" letter-spacing="0.05em">WITH NUMBER()</text>

<!-- code box -->
<rect x="40" y="194" width="500" height="36" rx="8" fill="#1A1E2E"/>
<text x="60" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#AFA9EC">let </text>
<text x="84" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#85B7EB">age </text>
<text x="114" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">= </text>
<text x="130" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#9FE1CB">Number</text>
<text x="182" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">(</text>
<text x="190" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#FAC775">prompt</text>
<text x="238" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">(</text>
<text x="246" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#9FE1CB">'How old are you?'</text>
<text x="400" y="216" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">))</text>

<!-- flow: user types → Number converts → gets back -->
<rect x="40" y="240" width="110" height="52" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="95" y="262" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">user types</text>
<text x="95" y="282" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#2C2C2A">13</text>

<line x1="152" y1="266" x2="178" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="180" y="240" width="110" height="52" rx="8" fill="#1A1E2E"/>
<text x="235" y="262" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#9C9A92">age contains</text>
<text x="235" y="282" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#9FE1CB">13</text>

<line x1="292" y1="266" x2="318" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="320" y="240" width="220" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="430" y="256" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#085041">math works</text>
<text x="430" y="274" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#085041">13 + 1  =  14</text>
<text x="430" y="288" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#1D9E75">added correctly</text>

</svg>
