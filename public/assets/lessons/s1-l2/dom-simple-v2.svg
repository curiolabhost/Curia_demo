<svg width="580" height="220" viewBox="0 0 580 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The DOM — JavaScript's bridge to HTML</title>
<desc>A simple three step diagram showing HTML building an element, the DOM connecting them, and JavaScript finding and changing it.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">THE DOM</text>

<!-- ── CARD 1: HTML ── -->
<text x="100" y="50" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#185FA5" letter-spacing="0.05em">HTML</text>
<rect x="40" y="58" width="120" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="100" y="88" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#0C447C">&lt;p id="score"&gt;</text>
<text x="100" y="108" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#0C447C">0</text>
<text x="100" y="126" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#0C447C">&lt;/p&gt;</text>
<text x="100" y="152" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">builds the element</text>

<!-- arrow HTML → DOM -->
<line x1="162" y1="98" x2="196" y2="98" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── CARD 2: DOM (bridge) ── -->
<text x="290" y="50" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D9E75" letter-spacing="0.05em">DOM</text>
<rect x="200" y="58" width="180" height="80" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="290" y="88" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="500" fill="#085041">the bridge</text>
<text x="290" y="108" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1D9E75">document</text>
<text x="290" y="124" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1D9E75">.getElementById('score')</text>
<text x="290" y="152" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">finds the element</text>

<!-- arrow DOM → JS -->
<line x1="382" y1="98" x2="416" y2="98" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── CARD 3: JS ── -->
<text x="480" y="50" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#534AB7" letter-spacing="0.05em">JAVASCRIPT</text>
<rect x="420" y="58" width="120" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="480" y="84" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#3C3489">score.textContent</text>
<text x="480" y="102" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#3C3489">= 'Score: 10'</text>
<rect x="436" y="112" width="88" height="22" rx="5" fill="#1A1E2E"/>
<text x="480" y="123" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="600" fill="#AFA9EC">Score: 10</text>
<text x="480" y="152" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">changes the element</text>

<!-- caption -->
<text x="290" y="188" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#8B91A8">HTML builds it. The DOM finds it. JavaScript changes it.</text>

</svg>
