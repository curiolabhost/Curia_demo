<svg width="100%" viewBox="0 0 680 240" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Shortcut operators in JavaScript</title>
<desc>Side by side comparison: the long way to write math assignments versus the shortcut version using +=, -=, *=, ++, and --</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="30" y="16" width="270" height="28" rx="6" fill="#F1F3F8" stroke="#E2E6F0" stroke-width="0.5"/>
<text x="165" y="34" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#4A5068">the long way</text>

<rect x="380" y="16" width="270" height="28" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="515" y="34" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#27500A">the shortcut</text>

<text x="340" y="34" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="18" fill="#8B91A8">=</text>

<rect x="30" y="56" width="270" height="176" rx="6" fill="none" stroke="#E2E6F0" stroke-width="0.5"/>
<rect x="380" y="56" width="270" height="176" rx="6" fill="#F6FBF0" stroke="#3B6D11" stroke-width="0.5"/>

<line x1="30" y1="92" x2="650" y2="92" stroke="#E2E6F0" stroke-width="0.5"/>
<line x1="30" y1="126" x2="650" y2="126" stroke="#E2E6F0" stroke-width="0.5"/>
<line x1="30" y1="160" x2="650" y2="160" stroke="#E2E6F0" stroke-width="0.5"/>
<line x1="30" y1="194" x2="650" y2="194" stroke="#E2E6F0" stroke-width="0.5"/>

<text x="165" y="78" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#1A1E2E">score = score + 10</text>
<text x="515" y="78" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#27500A">score += 10</text>
<line x1="302" y1="74" x2="378" y2="74" stroke="#8B91A8" stroke-width="1" marker-end="url(#arr)"/>

<text x="165" y="112" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#1A1E2E">lives = lives - 1</text>
<text x="515" y="112" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#27500A">lives -= 1</text>
<line x1="302" y1="108" x2="378" y2="108" stroke="#8B91A8" stroke-width="1" marker-end="url(#arr)"/>

<text x="165" y="146" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#1A1E2E">coins = coins * 2</text>
<text x="515" y="146" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#27500A">coins *= 2</text>
<line x1="302" y1="142" x2="378" y2="142" stroke="#8B91A8" stroke-width="1" marker-end="url(#arr)"/>

<text x="165" y="180" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#1A1E2E">count = count + 1</text>
<text x="515" y="180" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#27500A">count++</text>
<line x1="302" y1="176" x2="378" y2="176" stroke="#8B91A8" stroke-width="1" marker-end="url(#arr)"/>

<text x="165" y="214" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#1A1E2E">count = count - 1</text>
<text x="515" y="214" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#27500A">count--</text>
<line x1="302" y1="210" x2="378" y2="210" stroke="#8B91A8" stroke-width="1" marker-end="url(#arr)"/>
</svg>
