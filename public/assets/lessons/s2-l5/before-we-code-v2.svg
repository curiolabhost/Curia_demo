<svg width="580" height="252" viewBox="0 0 580 252" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Before we start coding — think about this</title>
<desc>A visual showing the problem: you want to greet a player by name but don't know who will play. Three options are shown: guess it, figure it out, or ask the player.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">BEFORE WE START CODING</text>

<!-- ── PROBLEM BOX ── -->
<rect x="40" y="36" width="500" height="56" rx="8" fill="#1A1E2E"/>
<text x="60" y="58" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="500" fill="#C2C0B6">You want to greet the player by name.</text>
<text x="60" y="78" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#D85A30">let name = 'Alex'</text>
<text x="232" y="78" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#9C9A92">  ← won't always be Alex.</text>

<!-- down arrow -->
<line x1="290" y1="94" x2="290" y2="114" stroke="#888780" stroke-width="1.5"/>
<polygon points="284,110 290,120 296,110" fill="#888780"/>

<!-- question -->
<text x="290" y="136" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A">How do you get the player's name?</text>

<!-- ── THREE OPTIONS ── -->

<!-- Option 1: Guess — wrong -->
<rect x="40" y="152" width="148" height="80" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="114" y="178" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#993C1D">Guess it?</text>
<text x="114" y="196" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#D85A30">✗</text>
<text x="114" y="220" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#712B13">could be anyone</text>

<!-- Option 2: Figure it out — wrong -->
<rect x="216" y="152" width="148" height="80" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="290" y="172" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#993C1D">Code figures</text>
<text x="290" y="188" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#993C1D">it out?</text>
<text x="290" y="208" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#D85A30">✗</text>
<text x="290" y="224" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#712B13">code can't read minds</text>

<!-- Option 3: Ask the player — correct -->
<rect x="392" y="152" width="148" height="80" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text x="466" y="178" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#085041">Ask the player</text>
<text x="466" y="196" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#1D9E75">✓</text>
<text x="466" y="220" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#085041">that's what prompt() does</text>


</svg>
