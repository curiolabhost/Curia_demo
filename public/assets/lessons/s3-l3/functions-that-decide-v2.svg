<svg width="580" height="340" viewBox="0 0 580 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Functions that make decisions — combining if/else with return</title>
<desc>A visual showing how a function takes in values, makes a decision using if/else, and returns a result back to the caller.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">FUNCTIONS THAT MAKE DECISIONS</text>

<!-- ══ TWO INGREDIENTS ══ -->
<text x="114" y="48" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#185FA5" letter-spacing="0.05em">INGREDIENT 1</text>
<text x="466" y="48" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#854F0B" letter-spacing="0.05em">INGREDIENT 2</text>

<!-- functions box -->
<rect x="32" y="56" width="164" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="114" y="78" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#0C447C">functions</text>
<text x="114" y="98" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#185FA5">can return values</text>

<!-- if/else box -->
<rect x="384" y="56" width="164" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="466" y="78" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#633806">if / else</text>
<text x="466" y="98" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#854F0B">makes decisions</text>

<!-- + sign -->
<text x="290" y="94" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="28" font-weight="700" fill="#B4B2A9">+</text>

<!-- arrows → combined box -->
<line x1="196" y1="88" x2="238" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="384" y1="88" x2="342" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ══ COMBINED: decision function ══ -->
<rect x="140" y="132" width="300" height="64" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="290" y="154" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#2C2C2A">a function that makes a decision</text>
<rect x="148" y="166" width="284" height="20" rx="4" fill="#1A1E2E"/>
<text x="290" y="176" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#85B7EB">function checkResult(a, b) { ... }</text>

<!-- arrow → code block -->
<line x1="290" y1="196" x2="290" y2="216" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ══ CODE BLOCK ══ -->
<rect x="100" y="218" width="380" height="86" rx="8" fill="#13122A" stroke="#2E2B4A" stroke-width="0.5"/>
<text x="120" y="238" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#AFA9EC">function </text>
<text x="192" y="238" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#85B7EB">checkResult</text>
<text x="276" y="238" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">(a, b) {</text>
<text x="130" y="256" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">  if (a === b) { </text>
<text x="280" y="256" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#AFA9EC">return </text>
<text x="330" y="256" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#9FE1CB">true</text>
<text x="357" y="256" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">; }</text>
<text x="130" y="274" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">  else      { </text>
<text x="280" y="274" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#AFA9EC">return </text>
<text x="330" y="274" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#D85A30">false</text>
<text x="366" y="274" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">; }</text>
<text x="120" y="292" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">}</text>

<!-- ══ SIMON SAYS LABEL ══ -->
<rect x="100" y="314" width="380" height="22" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="290" y="325" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="500" fill="#185FA5">Simon Says uses this to check: did the player get it right?</text>

</svg>
