<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
      .sans { font-family: 'DM Sans', system-ui, sans-serif; }
      .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
      .shadow { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.08)); }
    </style>
  </defs>

  <rect width="600" height="220" fill="#F8F9FC"/>

  <!-- Title -->
  <text x="300" y="28" class="sans" font-size="16" font-weight="700" fill="#1A1E2E" text-anchor="middle">Your program's memory</text>

  <!-- Box 1: score / 42 / blue -->
  <g class="shadow">
    <rect x="52" y="58" width="70" height="24" rx="12" fill="#EEF3FD" stroke="#3B6FE8" stroke-width="1.5"/>
    <text x="87" y="74" class="sans" font-size="12" font-weight="700" fill="#3B6FE8" text-anchor="middle">score</text>
  </g>
  <g class="shadow">
    <rect x="32" y="92" width="110" height="80" rx="6" fill="#FFFFFF" stroke="#3B6FE8" stroke-width="2"/>
    <text x="87" y="142" class="mono" font-size="22" fill="#1A1E2E" text-anchor="middle">42</text>
  </g>

  <!-- Box 2: name / "Alex" / purple -->
  <g class="shadow">
    <rect x="194" y="58" width="70" height="24" rx="12" fill="#F3EEFD" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="229" y="74" class="sans" font-size="12" font-weight="700" fill="#7C3AED" text-anchor="middle">name</text>
  </g>
  <g class="shadow">
    <rect x="174" y="92" width="110" height="80" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
    <text x="229" y="142" class="mono" font-size="22" fill="#1A1E2E" text-anchor="middle">"Alex"</text>
  </g>

  <!-- Box 3: lives / 3 / green -->
  <g class="shadow">
    <rect x="336" y="58" width="70" height="24" rx="12" fill="#E6F7EF" stroke="#059669" stroke-width="1.5"/>
    <text x="371" y="74" class="sans" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">lives</text>
  </g>
  <g class="shadow">
    <rect x="316" y="92" width="110" height="80" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="2"/>
    <text x="371" y="142" class="mono" font-size="22" fill="#1A1E2E" text-anchor="middle">3</text>
  </g>

  <!-- Box 4: isWinning / true / orange -->
  <g class="shadow">
    <rect x="478" y="58" width="80" height="24" rx="12" fill="#FDF2E2" stroke="#D97706" stroke-width="1.5"/>
    <text x="518" y="74" class="sans" font-size="12" font-weight="700" fill="#D97706" text-anchor="middle">isWinning</text>
  </g>
  <g class="shadow">
    <rect x="458" y="92" width="110" height="80" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="2"/>
    <text x="513" y="142" class="mono" font-size="22" fill="#1A1E2E" text-anchor="middle">true</text>
  </g>

  <!-- Caption -->
  <text x="300" y="200" class="sans" font-size="13" font-style="italic" fill="#8B91A8" text-anchor="middle">Each variable has its own name and its own value.</text>
</svg>
