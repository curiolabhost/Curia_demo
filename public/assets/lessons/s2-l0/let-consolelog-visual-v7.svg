<svg width="580" height="300" viewBox="0 0 580 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Two tools — let and console.log</title>
<desc>Two cards showing the two foundational tools in JavaScript: let creates a named box to store a value, console.log looks inside and prints it.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">TWO TOOLS. THAT'S IT.</text>

<!-- ── CARD 1: let ── -->
<text x="40" y="46" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#185FA5" letter-spacing="0.05em">TOOL 1 — SAVE IT</text>
<rect x="40" y="54" width="500" height="88" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>

<rect x="58" y="80" width="172" height="36" rx="6" fill="#1A1E2E"/>
<text x="68" y="98" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#AFA9EC">let </text>
<text x="98" y="98" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#85B7EB">count </text>
<text x="148" y="98" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#C2C0B6">= </text>
<text x="168" y="98" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#9FE1CB">1</text>

<line x1="234" y1="98" x2="252" y2="98" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="256" y="62" width="60" height="18" rx="9" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="286" y="71" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#0C447C">count</text>

<rect x="256" y="82" width="60" height="36" rx="6" fill="#ffffff" stroke="#185FA5" stroke-width="1.5"/>
<text x="286" y="100" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#0C447C">1</text>

<!-- description tool 1 — max ~22 chars per line to stay within 530px -->
<text x="334" y="78" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#2C2C2A">Create a box (variable)</text>
<text x="334" y="96" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#2C2C2A">and put a value inside.</text>
<text x="334" y="118" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#4A5068">Only use <tspan font-family="'IBM Plex Mono', monospace" font-size="11" fill="#AFA9EC">let</tspan> once — first time.</text>

<!-- ── CARD 2: console.log ── -->
<text x="40" y="166" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#0F6E56" letter-spacing="0.05em">TOOL 2 — SEE IT</text>
<rect x="40" y="174" width="500" height="88" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>

<rect x="58" y="200" width="172" height="36" rx="6" fill="#1A1E2E"/>
<text x="68" y="218" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#9FE1CB">console</text>
<text x="122" y="218" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">.</text>
<text x="130" y="218" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#9FE1CB">log</text>
<text x="156" y="218" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">(</text>
<text x="164" y="218" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#85B7EB">count</text>
<text x="200" y="218" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#C2C0B6">)</text>

<line x1="234" y1="218" x2="252" y2="218" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="256" y="200" width="60" height="36" rx="6" fill="#1A1E2E"/>
<text x="286" y="218" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#9FE1CB">1</text>

<!-- description tool 2 -->
<text x="334" y="198" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#2C2C2A">Look inside the box and</text>
<text x="334" y="216" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#2C2C2A">print what's there.</text>
<text x="334" y="238" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#085041" font-weight="500">Proves your code is working!</text>

<!-- caption -->
<text x="290" y="284" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#8B91A8">Everything in JavaScript is built on top of these two things.</text>

</svg>
