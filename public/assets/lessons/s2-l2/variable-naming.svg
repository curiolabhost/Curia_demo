<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="600" height="260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
      .sans { font-family: 'DM Sans', system-ui, sans-serif; }
      .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
      .shadow { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.08)); }
    </style>
  </defs>

  <rect width="600" height="260" fill="#F8F9FC"/>

  <!-- Vertical divider -->
  <line x1="300" y1="30" x2="300" y2="220" stroke="#E2E6F0" stroke-width="1"/>

  <!-- LEFT column header -->
  <text x="150" y="38" class="sans" font-size="14" font-weight="700" fill="#059669" text-anchor="middle">✅ Good names</text>

  <!-- LEFT row 1: playerScore = 0 -->
  <g class="shadow">
    <rect x="35" y="62" width="130" height="26" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
    <text x="100" y="80" class="mono" font-size="13" fill="#059669" text-anchor="middle">playerScore</text>
  </g>
  <text x="175" y="80" class="mono" font-size="13" fill="#1A1E2E">= 0</text>

  <!-- LEFT row 2: userName = "Alex" -->
  <g class="shadow">
    <rect x="35" y="98" width="130" height="26" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
    <text x="100" y="116" class="mono" font-size="13" fill="#059669" text-anchor="middle">userName</text>
  </g>
  <text x="175" y="116" class="mono" font-size="13" fill="#1A1E2E">= "Alex"</text>

  <!-- LEFT row 3: isGameOver = false -->
  <g class="shadow">
    <rect x="35" y="134" width="130" height="26" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
    <text x="100" y="152" class="mono" font-size="13" fill="#059669" text-anchor="middle">isGameOver</text>
  </g>
  <text x="175" y="152" class="mono" font-size="13" fill="#1A1E2E">= false</text>

  <!-- LEFT row 4: totalCoins = 100 -->
  <g class="shadow">
    <rect x="35" y="170" width="130" height="26" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
    <text x="100" y="188" class="mono" font-size="13" fill="#059669" text-anchor="middle">totalCoins</text>
  </g>
  <text x="175" y="188" class="mono" font-size="13" fill="#1A1E2E">= 100</text>

  <!-- RIGHT column header -->
  <text x="450" y="38" class="sans" font-size="14" font-weight="700" fill="#DC2626" text-anchor="middle">❌ Bad names</text>

  <!-- RIGHT row 1: x = 0 -->
  <g class="shadow">
    <rect x="345" y="62" width="60" height="26" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="375" y="80" class="mono" font-size="13" fill="#DC2626" text-anchor="middle">x</text>
  </g>
  <text x="415" y="80" class="mono" font-size="13" fill="#1A1E2E">= 0</text>

  <!-- RIGHT row 2: s = "Alex" -->
  <g class="shadow">
    <rect x="345" y="98" width="60" height="26" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="375" y="116" class="mono" font-size="13" fill="#DC2626" text-anchor="middle">s</text>
  </g>
  <text x="415" y="116" class="mono" font-size="13" fill="#1A1E2E">= "Alex"</text>

  <!-- RIGHT row 3: b = false -->
  <g class="shadow">
    <rect x="345" y="134" width="60" height="26" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="375" y="152" class="mono" font-size="13" fill="#DC2626" text-anchor="middle">b</text>
  </g>
  <text x="415" y="152" class="mono" font-size="13" fill="#1A1E2E">= false</text>

  <!-- RIGHT row 4: n = 100 -->
  <g class="shadow">
    <rect x="345" y="170" width="60" height="26" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="375" y="188" class="mono" font-size="13" fill="#DC2626" text-anchor="middle">n</text>
  </g>
  <text x="415" y="188" class="mono" font-size="13" fill="#1A1E2E">= 100</text>

  <!-- Bottom caption -->
  <text x="300" y="240" class="sans" font-size="13" font-style="italic" fill="#8B91A8" text-anchor="middle">Name variables so anyone can understand what they hold.</text>
</svg>
