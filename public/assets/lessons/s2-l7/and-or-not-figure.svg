<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="12" fill="#F8F9FA" stroke="#E9ECEF" stroke-width="2"/>
  
  <text x="30" y="45" font-family="sans-serif" font-size="20" font-weight="bold" fill="#343A40">Logical Operators</text>
  <text x="30" y="70" font-family="sans-serif" font-size="14" fill="#6C757D">Combining conditions for the Robot Judge</text>

  <g transform="translate(30, 100)">
    <rect width="540" height="80" rx="8" fill="white" stroke="#DEE2E6" stroke-width="1"/>
    <text x="20" y="35" font-family="monospace" font-size="22" font-weight="bold" fill="#4DABF7">&amp;&amp;</text>
    <text x="80" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#343A40">AND</text>
    <text x="80" y="55" font-family="sans-serif" font-size="13" fill="#495057">Both conditions must be TRUE to pass.</text>
    <rect x="400" y="25" width="30" height="30" rx="4" fill="#4DABF7" opacity="0.8"/>
    <text x="435" y="45" font-family="sans-serif" font-size="16" fill="#343A40">+</text>
    <rect x="455" y="25" width="30" height="30" rx="4" fill="#4DABF7" opacity="0.8"/>
    <text x="495" y="45" font-family="sans-serif" font-size="16" fill="#343A40">→</text>
  </g>

  <g transform="translate(30, 200)">
    <rect width="540" height="80" rx="8" fill="white" stroke="#DEE2E6" stroke-width="1"/>
    <text x="20" y="35" font-family="monospace" font-size="22" font-weight="bold" fill="#4DABF7">||</text>
    <text x="80" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#343A40">OR</text>
    <text x="80" y="55" font-family="sans-serif" font-size="13" fill="#495057">At least one condition must be TRUE.</text>
    <rect x="400" y="15" width="30" height="20" rx="4" fill="#4DABF7" opacity="0.8"/>
    <rect x="400" y="45" width="30" height="20" rx="4" fill="#CED4DA"/>
    <text x="445" y="45" font-family="sans-serif" font-size="16" fill="#343A40">→</text>
  </g>

  <g transform="translate(30, 300)">
    <rect width="540" height="80" rx="8" fill="white" stroke="#DEE2E6" stroke-width="1"/>
    <text x="25" y="35" font-family="monospace" font-size="22" font-weight="bold" fill="#FF922B">!</text>
    <text x="80" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#343A40">NOT</text>
    <text x="80" y="55" font-family="sans-serif" font-size="13" fill="#495057">Flips the result (True becomes False).</text>
    <text x="400" y="45" font-family="sans-serif" font-size="14" fill="#343A40">TRUE</text>
    <text x="450" y="45" font-family="sans-serif" font-size="16" fill="#FF922B">→</text>
    <text x="475" y="45" font-family="sans-serif" font-size="14" fill="#343A40">FALSE</text>
  </g>
</svg>
