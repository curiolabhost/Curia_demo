<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
      .sans { font-family: 'DM Sans', system-ui, sans-serif; }
      .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
      .shadow { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.08)); }
    </style>
  </defs>

  <rect width="600" height="300" fill="#F8F9FC"/>

  <!-- LEFT BOX (before) -->
  <!-- Label pill -->
  <g class="shadow">
    <rect x="65" y="80" width="80" height="28" rx="14" fill="#EEF3FD" stroke="#3B6FE8" stroke-width="1.5"/>
    <text x="105" y="99" class="sans" font-size="14" font-weight="700" fill="#3B6FE8" text-anchor="middle">score</text>
  </g>
  <!-- Box -->
  <g class="shadow">
    <rect x="45" y="125" width="120" height="80" rx="6" fill="#FFFFFF" stroke="#3B6FE8" stroke-width="2"/>
    <text x="105" y="180" class="mono" font-size="32" fill="#1A1E2E" text-anchor="middle">0</text>
  </g>
  <!-- "before" label -->
  <text x="105" y="225" class="sans" font-size="12" fill="#8B91A8" text-anchor="middle">before</text>

  <!-- CENTER: code pill + arrow -->
  <g class="shadow">
    <rect x="225" y="120" width="150" height="28" rx="14" fill="#F1F3F8"/>
    <text x="300" y="139" class="mono" font-size="13" fill="#1A1E2E" text-anchor="middle">score = 10</text>
  </g>
  <!-- Arrow -->
  <g>
    <line x1="220" y1="170" x2="370" y2="170" stroke="#3B6FE8" stroke-width="3" stroke-linecap="round"/>
    <polygon points="380,170 365,162 365,178" fill="#3B6FE8"/>
  </g>

  <!-- RIGHT BOX (after) -->
  <g class="shadow">
    <rect x="435" y="80" width="80" height="28" rx="14" fill="#EEF3FD" stroke="#3B6FE8" stroke-width="1.5"/>
    <text x="475" y="99" class="sans" font-size="14" font-weight="700" fill="#3B6FE8" text-anchor="middle">score</text>
  </g>
  <g class="shadow">
    <rect x="415" y="125" width="120" height="80" rx="6" fill="#FFFFFF" stroke="#3B6FE8" stroke-width="2"/>
    <text x="475" y="180" class="mono" font-size="32" fill="#059669" text-anchor="middle">10</text>
  </g>
  <text x="475" y="225" class="sans" font-size="12" fill="#8B91A8" text-anchor="middle">after</text>

  <!-- Bottom warning -->
  <text x="300" y="270" class="sans" font-size="13" fill="#D97706" text-anchor="middle">⚠ The old value (0) is gone forever.</text>
</svg>
