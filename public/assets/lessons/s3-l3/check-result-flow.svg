<svg width="580" height="380" viewBox="0 0 580 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How checkResult() works in Simon Says</title>
<desc>A flowchart showing two inputs entering checkResult, a comparison being made, then either true or false being returned to the caller.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">HOW CHECKRESULT() WORKS</text>

<!-- ══ INPUTS ══ -->
<!-- playerAnswer -->
<rect x="40" y="40" width="148" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="114" y="60" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#185FA5">playerAnswer</text>
<rect x="56" y="72" width="116" height="12" rx="4" fill="#1A1E2E"/>
<text x="114" y="78" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#85B7EB">'blue'</text>

<!-- correctAnswer -->
<rect x="392" y="40" width="148" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="466" y="60" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#534AB7">correctAnswer</text>
<rect x="408" y="72" width="116" height="12" rx="4" fill="#1A1E2E"/>
<text x="466" y="78" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#AFA9EC">'blue'</text>

<!-- arrows inputs → function box -->
<line x1="188" y1="66" x2="224" y2="102" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="392" y1="66" x2="356" y2="102" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ══ FUNCTION BOX ══ -->
<rect x="196" y="100" width="188" height="52" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="290" y="120" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#2C2C2A">checkResult()</text>
<text x="290" y="140" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">receives both inputs</text>

<!-- arrow function → diamond -->
<line x1="290" y1="152" x2="290" y2="174" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ══ DECISION DIAMOND ══ -->
<polygon points="290,178 370,210 290,242 210,210" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="290" y="204" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#2C2C2A">playerAnswer</text>
<text x="290" y="218" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#2C2C2A">=== correctAnswer</text>

<!-- ── LEFT: false branch ── -->
<!-- arrow diamond → false -->
<line x1="210" y1="210" x2="148" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="179" y="202" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#8B91A8">no</text>

<!-- false return box -->
<rect x="30" y="186" width="116" height="48" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="88" y="204" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#993C1D">return</text>
<text x="88" y="222" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#D85A30">false</text>

<!-- arrow false → caller false -->
<line x1="88" y1="234" x2="88" y2="262" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- caller false result -->
<rect x="30" y="264" width="116" height="52" rx="8" fill="#712B13" stroke="#D85A30" stroke-width="0.5"/>
<text x="88" y="283" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#F0997B">caller receives</text>
<text x="88" y="303" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#FAECE7">false</text>

<!-- wrong label -->
<rect x="30" y="330" width="116" height="26" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="88" y="343" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#993C1D">wrong answer</text>

<!-- ── RIGHT: true branch ── -->
<!-- arrow diamond → true -->
<line x1="370" y1="210" x2="434" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="402" y="202" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#8B91A8">yes</text>

<!-- true return box -->
<rect x="436" y="186" width="114" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="493" y="204" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#085041">return</text>
<text x="493" y="222" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#1D9E75">true</text>

<!-- arrow true → caller true -->
<line x1="493" y1="234" x2="493" y2="262" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- caller true result -->
<rect x="436" y="264" width="114" height="52" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
<text x="493" y="283" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#5DCAA5">caller receives</text>
<text x="493" y="303" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#E1F5EE">true</text>

<!-- correct label -->
<rect x="436" y="330" width="114" height="26" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="493" y="343" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#085041">correct answer</text>

</svg>
