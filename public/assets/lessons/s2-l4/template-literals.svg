<svg width="580" height="280" viewBox="0 0 580 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Template literals — fill-in-the-blank sentences</title>
<desc>Two rows comparing string concatenation with plus signs versus a template literal. The template literal shows the whole sentence at once with dollar-brace gaps for variables.</desc>

<!-- Section label -->
<text x="290" y="28" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">TEMPLATE LITERALS</text>

<!-- ── ROW 1: the old way ── -->
<text x="40" y="60" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#993C1D" letter-spacing="0.05em">THE OLD WAY</text>

<rect x="40" y="72" width="500" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>

<!-- 'Hello, ' -->
<rect x="56" y="84" width="76" height="20" rx="4" fill="#ffffff" stroke="#F0997B" stroke-width="0.5"/>
<text x="94" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#712B13">'Hello, '</text>

<!-- + -->
<text x="146" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#993C1D">+</text>

<!-- name -->
<rect x="158" y="84" width="52" height="20" rx="4" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="184" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#3C3489">name</text>

<!-- + -->
<text x="224" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#993C1D">+</text>

<!-- ' is ' -->
<rect x="236" y="84" width="52" height="20" rx="4" fill="#ffffff" stroke="#F0997B" stroke-width="0.5"/>
<text x="262" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#712B13">' is '</text>

<!-- + -->
<text x="302" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#993C1D">+</text>

<!-- age -->
<rect x="314" y="84" width="44" height="20" rx="4" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="336" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#3C3489">age</text>

<!-- + -->
<text x="372" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#993C1D">+</text>

<!-- ' years old' -->
<rect x="384" y="84" width="100" height="20" rx="4" fill="#ffffff" stroke="#F0997B" stroke-width="0.5"/>
<text x="434" y="98" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#712B13">' years old'</text>

<text x="498" y="98" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#993C1D">;</text>

<!-- caption -->
<text x="290" y="130" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#8B91A8">Break it into pieces, join with +</text>

<!-- down arrow -->
<line x1="290" y1="142" x2="290" y2="162" stroke="#B4B2A9" stroke-width="1.5"/>
<polygon points="284,158 290,168 296,158" fill="#B4B2A9"/>

<!-- ── ROW 2: template literal ── -->
<text x="40" y="186" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F6E56" letter-spacing="0.05em">TEMPLATE LITERAL</text>

<rect x="40" y="198" width="500" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>

<!-- backtick open -->
<text x="60" y="224" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#0F6E56">`</text>

<!-- Hello,  (plain text) -->
<text x="76" y="224" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#085041">Hello, </text>

<!-- ${name} -->
<rect x="138" y="210" width="66" height="22" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="171" y="225" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#3C3489">${name}</text>

<!-- ! is  (plain text) -->
<text x="210" y="224" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#085041">! You are </text>

<!-- ${age} -->
<rect x="322" y="210" width="58" height="22" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="351" y="225" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#3C3489">${age}</text>

<!-- years old (plain text) -->
<text x="386" y="224" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#085041"> years old</text>

<!-- backtick close -->
<text x="490" y="224" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#0F6E56">`</text>

<text x="510" y="224" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#0F6E56">;</text>

<!-- caption -->
<text x="290" y="258" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#8B91A8">Write the whole sentence — </text>
<text x="290" y="272" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#8B91A8">mark the gaps with ${}</text>

</svg>
