<svg width="100%" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How the remainder operator works</title>
<desc>10 dots arranged into groups of 3, showing 10 divided by 3 leaves 1 dot remaining. That leftover is what 10 % 3 returns.</desc>

<text x="340" y="32" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#1A1E2E">10 % 3 = 1</text>
<text x="340" y="54" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="13" fill="#4A5068">How many times does 3 fit into 10? Three times — with 1 left over.</text>

<rect x="54" y="80" width="120" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="114" y="100" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#0C447C">group 1</text>
<circle cx="84" cy="138" r="14" fill="#185FA5"/>
<circle cx="114" cy="138" r="14" fill="#185FA5"/>
<circle cx="144" cy="138" r="14" fill="#185FA5"/>
<text x="84" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">1</text>
<text x="114" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">2</text>
<text x="144" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">3</text>

<rect x="194" y="80" width="120" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="254" y="100" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#0C447C">group 2</text>
<circle cx="224" cy="138" r="14" fill="#185FA5"/>
<circle cx="254" cy="138" r="14" fill="#185FA5"/>
<circle cx="284" cy="138" r="14" fill="#185FA5"/>
<text x="224" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">4</text>
<text x="254" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">5</text>
<text x="284" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">6</text>

<rect x="334" y="80" width="120" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="394" y="100" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#0C447C">group 3</text>
<circle cx="364" cy="138" r="14" fill="#185FA5"/>
<circle cx="394" cy="138" r="14" fill="#185FA5"/>
<circle cx="424" cy="138" r="14" fill="#185FA5"/>
<text x="364" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">7</text>
<text x="394" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">8</text>
<text x="424" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">9</text>

<rect x="500" y="80" width="120" height="100" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="560" y="100" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#712B13">left over</text>
<circle cx="560" cy="138" r="14" fill="#D85A30"/>
<text x="560" y="143" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="white">10</text>

<rect x="500" y="188" width="120" height="28" rx="6" fill="#D85A30"/>
<text x="560" y="206" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="600" fill="white">result = 1</text>

<text x="340" y="242" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#8B91A8">% gives you the leftover — not how many groups fit, just what remains.</text>
</svg>
