<svg width="100%" viewBox="0 0 680 330" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Anatomy of a variable declaration</title>
<desc>The line let score = 0 broken into three color-coded parts with labeled boxes below: keyword, name, and value</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="40" y="40" width="600" height="68" rx="10" fill="#F1F3F8" stroke="#E2E6F0" stroke-width="0.5"/>

<text x="120" y="83" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="28" font-weight="600" fill="#7C3AED">let</text>
<text x="270" y="83" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="28" font-weight="600" fill="#185FA5">score</text>
<text x="380" y="83" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="28" font-weight="400" fill="#8B91A8">=</text>
<text x="450" y="83" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="28" font-weight="600" fill="#3B6D11">0</text>
<text x="500" y="83" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="28" font-weight="400" fill="#8B91A8">;</text>

<rect x="92" y="98" width="56" height="3" rx="1.5" fill="#7C3AED" opacity="0.7"/>
<rect x="218" y="98" width="104" height="3" rx="1.5" fill="#185FA5" opacity="0.7"/>
<rect x="432" y="98" width="36" height="3" rx="1.5" fill="#3B6D11" opacity="0.7"/>

<line x1="120" y1="112" x2="110" y2="150" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="270" y1="112" x2="270" y2="150" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="450" y1="112" x2="430" y2="150" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="30" y="154" width="160" height="70" rx="8" fill="#EEEDFE" stroke="#7C3AED" stroke-width="1"/>
<text x="110" y="177" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#3C3489">The keyword</text>
<text x="110" y="196" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#534AB7">use once, the first time</text>
<text x="110" y="213" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#534AB7">you make the variable</text>

<rect x="210" y="154" width="160" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="290" y="177" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#0C447C">The name</text>
<text x="290" y="196" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#185FA5">you choose this — it's</text>
<text x="290" y="213" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#185FA5">how you find it later</text>

<rect x="390" y="154" width="160" height="70" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text x="470" y="177" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#27500A">The value</text>
<text x="470" y="196" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#3B6D11">whatever you want</text>
<text x="470" y="213" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#3B6D11">to store inside it</text>

<line x1="40" y1="246" x2="640" y2="246" stroke="#E2E6F0" stroke-width="0.5"/>

<text x="40" y="268" font-family="'DM Sans', system-ui, sans-serif" font-size="13" fill="#4A5068">Text works the same way — just wrap the value in quotes:</text>

<rect x="40" y="278" width="600" height="44" rx="8" fill="#F1F3F8" stroke="#E2E6F0" stroke-width="0.5"/>
<text x="110" y="306" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="22" font-weight="600" fill="#7C3AED">let</text>
<text x="258" y="306" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="22" font-weight="600" fill="#185FA5">playerName</text>
<text x="355" y="306" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="22" font-weight="400" fill="#8B91A8">=</text>
<text x="458" y="306" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="22" font-weight="600" fill="#854F0B">'Jordan'</text>
<text x="520" y="306" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="22" font-weight="400" fill="#8B91A8">;</text>
<rect x="404" y="314" width="108" height="3" rx="1.5" fill="#854F0B" opacity="0.6"/>
<text x="458" y="328" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#854F0B">quotes = text (called a "string")</text>
</svg>
