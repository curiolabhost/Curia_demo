<svg width="580" height="340" viewBox="0 0 580 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Two jobs a function can do — console.log vs return</title>
<desc>A flowchart showing that a function can either log output for a human to read using console.log, or return a value for the rest of the code to use using return.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">A FUNCTION HAS TWO JOBS</text>

<!-- ── CENTRE: function box ── -->
<rect x="186" y="40" width="208" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="290" y="62" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#3C3489">function double(n) {</text>
<text x="290" y="82" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#534AB7">runs some code...</text>

<!-- arrow function → diamond -->
<line x1="290" y1="96" x2="290" y2="118" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── DECISION diamond ── -->
<polygon points="290,122 360,152 290,182 220,152" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="290" y="148" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#2C2C2A">which</text>
<text x="290" y="163" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#2C2C2A">job?</text>

<!-- arrows diamond → sides -->
<line x1="220" y1="152" x2="162" y2="152" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="360" y1="152" x2="418" y2="152" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ══ LEFT DASHED BOX — snug around content y=130 to y=308 ══ -->
<rect x="14" y="130" width="144" height="178" rx="10" fill="#FAEEDA" fill-opacity="0.3" stroke="#854F0B" stroke-width="1" stroke-dasharray="5 3"/>
<text x="86" y="122" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#854F0B" letter-spacing="0.05em">SHOW RESULTS</text>

<!-- LEFT: console.log box — centred in left dashed box x=86 -->
<rect x="24" y="138" width="124" height="46" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="86" y="156" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="600" fill="#633806">console.log</text>
<text x="86" y="172" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#854F0B">(n * 2)</text>

<!-- arrow → screen result -->
<line x1="86" y1="184" x2="86" y2="204" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- screen result box -->
<rect x="24" y="206" width="124" height="52" rx="8" fill="#633806" stroke="#854F0B" stroke-width="0.5"/>
<text x="86" y="225" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#FAC775">10</text>
<text x="86" y="246" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#EF9F27">printed to screen</text>

<!-- gone label -->
<rect x="24" y="272" width="124" height="26" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="86" y="285" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#993C1D">code can't use it</text>

<!-- ══ RIGHT DASHED BOX — snug around content, wider for text ══ -->
<rect x="422" y="130" width="148" height="178" rx="10" fill="#E1F5EE" fill-opacity="0.3" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3"/>
<text x="496" y="122" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D9E75" letter-spacing="0.05em">HAND RESULTS BACK TO CODE</text>

<!-- RIGHT: return box — centred in right dashed box x=496 -->
<rect x="432" y="138" width="128" height="46" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="496" y="156" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#085041">return</text>
<text x="496" y="172" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1D9E75">n * 2</text>

<!-- arrow → caller result -->
<line x1="496" y1="184" x2="496" y2="204" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- caller result box — wider so text fits -->
<rect x="432" y="206" width="128" height="52" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
<text x="496" y="225" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#9FE1CB">10</text>
<text x="496" y="246" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#5DCAA5">handed back to computer</text>

<!-- usable label -->
<rect x="432" y="272" width="128" height="26" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="496" y="285" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#085041">code can use it</text>

</svg>
