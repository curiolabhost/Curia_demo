<svg width="100%" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Order of operations in JavaScript math</title>
<desc>Two expressions compared side by side. Left: 2 + 3 times 4 equals 14 because multiplication runs first. Right: parentheses version equals 20 because parentheses run first.</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="30" y="20" width="290" height="220" rx="8" fill="#F1F3F8" stroke="#E2E6F0" stroke-width="0.5"/>
<text x="175" y="62" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="22" font-weight="600" fill="#1A1E2E">2 + 3 * 4</text>
<path d="M 222 70 Q 222 95 175 95" fill="none" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="110" y="98" width="132" height="24" rx="6" fill="#EEEDFE" stroke="#7C3AED" stroke-width="0.5"/>
<text x="176" y="114" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#3C3489">3 * 4 = 12 runs first</text>
<text x="175" y="158" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#4A5068">2 + <tspan fill="#7C3AED" font-weight="600">12</tspan></text>
<rect x="105" y="174" width="140" height="40" rx="8" fill="#1A1E2E"/>
<text x="175" y="199" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="white">= 14</text>
<text x="175" y="228" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#8B91A8">* always runs before +</text>

<rect x="360" y="20" width="290" height="220" rx="8" fill="#F1F3F8" stroke="#E2E6F0" stroke-width="0.5"/>
<text x="505" y="62" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="22" font-weight="600" fill="#1A1E2E"><tspan fill="#059669">(</tspan>2 + 3<tspan fill="#059669">)</tspan> * 4</text>
<path d="M 481 70 Q 460 95 505 95" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="436" y="98" width="138" height="24" rx="6" fill="#EAF3DE" stroke="#059669" stroke-width="0.5"/>
<text x="505" y="114" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#27500A">(2 + 3) = 5 runs first</text>
<text x="505" y="158" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#4A5068"><tspan fill="#059669" font-weight="600">5</tspan> * 4</text>
<rect x="435" y="174" width="140" height="40" rx="8" fill="#059669"/>
<text x="505" y="199" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="white">= 20</text>
<text x="505" y="228" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="12" fill="#8B91A8">( ) run before everything</text>

<rect x="308" y="105" width="44" height="28" rx="14" fill="#E2E6F0"/>
<text x="330" y="123" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#4A5068">vs</text>
</svg>
