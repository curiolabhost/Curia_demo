<svg width="580" height="420" viewBox="0 0 580 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>checkResult in the real Simon Says game</title>
<desc>A flowchart showing checkResult checking if the player's clicks match the sequence, then either advancing the level or ending the game.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="290" y="24" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A5068" letter-spacing="0.07em">CHECKRESULT() IN THE REAL GAME</text>

<!-- ══ TRIGGER ══ -->
<rect x="190" y="36" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="290" y="54" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#3C3489">checkResult()</text>
<text x="290" y="70" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#534AB7">player finished clicking</text>

<!-- arrow → diamond -->
<line x1="290" y1="80" x2="290" y2="104" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ══ DECISION DIAMOND ══ -->
<polygon points="290,108 390,148 290,188 190,148" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="290" y="138" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#2C2C2A">playerClicks</text>
<text x="290" y="153" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#2C2C2A">=== sequence?</text>

<!-- ══ LEFT BRANCH: wrong ══ -->
<line x1="190" y1="148" x2="130" y2="148" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="160" y="140" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#8B91A8">no</text>

<!-- wrong dashed box -->
<rect x="14" y="118" width="114" height="200" rx="10" fill="#FAECE7" fill-opacity="0.3" stroke="#D85A30" stroke-width="1" stroke-dasharray="5 3"/>
<text x="71" y="110" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#D85A30" letter-spacing="0.05em">WRONG</text>

<!-- log wrong -->
<rect x="24" y="126" width="94" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="71" y="143" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#993C1D">console.log(</text>
<text x="71" y="159" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#D85A30">'Wrong.')</text>

<!-- arrow → showGameOver -->
<line x1="71" y1="170" x2="71" y2="190" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- showGameOver -->
<rect x="24" y="192" width="94" height="36" rx="8" fill="#712B13" stroke="#D85A30" stroke-width="0.5"/>
<text x="71" y="204" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#FAECE7">showGame</text>
<text x="71" y="220" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#FAECE7">Over()</text>

<!-- arrow → end state -->
<line x1="71" y1="228" x2="71" y2="250" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- end state -->
<rect x="24" y="252" width="94" height="36" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="71" y="266" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#993C1D">game</text>
<text x="71" y="282" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#993C1D">over</text>

<!-- ══ RIGHT BRANCH: correct ══ -->
<line x1="390" y1="148" x2="452" y2="148" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="421" y="140" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#8B91A8">yes</text>

<!-- correct dashed box -->
<rect x="454" y="118" width="114" height="200" rx="10" fill="#E1F5EE" fill-opacity="0.3" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3"/>
<text x="511" y="110" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D9E75" letter-spacing="0.05em">CORRECT</text>

<!-- level up -->
<rect x="464" y="126" width="94" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="511" y="143" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#085041">level =</text>
<text x="511" y="159" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#085041">level + 1</text>

<!-- arrow → log correct -->
<line x1="511" y1="170" x2="511" y2="190" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- log correct -->
<rect x="464" y="192" width="94" height="36" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
<text x="511" y="204" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#9FE1CB">console.log(</text>
<text x="511" y="220" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#9FE1CB">'Correct!')</text>

<!-- arrow → startRound -->
<line x1="511" y1="228" x2="511" y2="250" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- startRound -->
<rect x="464" y="252" width="94" height="36" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="511" y="266" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="600" fill="#085041">startRound</text>
<text x="511" y="282" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="600" fill="#085041">()</text>

<!-- ══ BOTTOM OUTCOME LABELS ══ -->
<rect x="14" y="330" width="114" height="28" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="71" y="344" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#993C1D">reset to level 1</text>

<rect x="454" y="330" width="114" height="28" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="511" y="344" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#085041">next round starts</text>

<!-- ══ CENTRE: code reference ══ -->
<rect x="168" y="228" width="244" height="120" rx="8" fill="#13122A" stroke="#2E2B4A" stroke-width="0.5"/>
<text x="180" y="248" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#C2C0B6">if (playerClicks ===</text>
<text x="180" y="264" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#FAC775">        sequence) {</text>
<text x="180" y="280" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#9FE1CB">  level = level + 1;</text>
<text x="180" y="296" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#9FE1CB">  startRound();</text>
<text x="180" y="312" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#C2C0B6">} else {</text>
<text x="180" y="328" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#D85A30">  showGameOver();</text>
<text x="180" y="344" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#C2C0B6">}</text>

<!-- arrows from diamond down to code box -->
<line x1="250" y1="188" x2="240" y2="228" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="330" y1="188" x2="340" y2="228" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>

</svg>
