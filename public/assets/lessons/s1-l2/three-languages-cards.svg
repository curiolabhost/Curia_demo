<svg width="100%" viewBox="0 0 580 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>HTML, CSS, and JavaScript — three languages, one game</title>
<desc>Three cards showing the role of each language in the Simon Says game. HTML builds the structure, CSS handles appearance, JavaScript controls behaviour.</desc>

<rect x="10" y="10" width="168" height="200" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="94" y="36" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="15" font-weight="600" fill="#0C447C">HTML</text>
<text x="94" y="56" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#185FA5">the structure</text>
<rect x="30" y="72" width="128" height="28" rx="6" fill="#ffffff" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="94" y="90" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1A1E2E">&lt;div class="grid"&gt;</text>
<rect x="30" y="108" width="128" height="28" rx="6" fill="#ffffff" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="94" y="126" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1A1E2E">&lt;button&gt;&lt;/button&gt;</text>
<text x="94" y="162" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">Builds the 4×4 grid</text>
<text x="94" y="178" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">and the buttons.</text>
<text x="94" y="196" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">No colours, no logic.</text>

<rect x="206" y="10" width="168" height="200" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="290" y="36" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="15" font-weight="600" fill="#633806">CSS</text>
<text x="290" y="56" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#854F0B">the appearance</text>
<rect x="226" y="72" width="128" height="28" rx="6" fill="#ffffff" stroke="#FAC775" stroke-width="0.5"/>
<text x="290" y="90" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1A1E2E">.lit { background:</text>
<rect x="226" y="108" width="128" height="28" rx="6" fill="#ffffff" stroke="#FAC775" stroke-width="0.5"/>
<text x="290" y="126" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1A1E2E">  yellow; }</text>
<text x="290" y="162" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">Colours the squares,</text>
<text x="290" y="178" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">sets sizes, adds the</text>
<text x="290" y="196" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">lit-up flash.</text>

<rect x="402" y="10" width="168" height="200" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="486" y="36" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="15" font-weight="600" fill="#3C3489">JS</text>
<text x="486" y="56" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#534AB7">the behaviour</text>
<rect x="422" y="72" width="128" height="28" rx="6" fill="#ffffff" stroke="#CECBF6" stroke-width="0.5"/>
<text x="486" y="90" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1A1E2E">btn.classList.add(</text>
<rect x="422" y="108" width="128" height="28" rx="6" fill="#ffffff" stroke="#CECBF6" stroke-width="0.5"/>
<text x="486" y="126" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1A1E2E">  'lit')</text>
<text x="486" y="162" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">Watches for clicks,</text>
<text x="486" y="178" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">runs the sequence,</text>
<text x="486" y="196" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4A5068">checks the answer.</text>

</svg>
