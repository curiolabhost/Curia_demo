<svg width="100%" viewBox="0 0 580 72" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How JS, HTML, and CSS connect to light up a square</title>
<desc>Three steps in sequence: JS adds the class lit to a button element, the HTML button now has that class, CSS sees the class and turns the square yellow.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="14" width="166" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="83" y="33" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#3C3489">JS runs</text>
<text x="83" y="50" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#534AB7">btn.classList.add('lit')</text>

<line x1="168" y1="36" x2="196" y2="36" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="198" y="14" width="166" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="281" y="33" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#0C447C">HTML button</text>
<text x="281" y="50" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#185FA5">now has class="lit"</text>

<line x1="366" y1="36" x2="394" y2="36" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="396" y="14" width="184" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="488" y="33" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#633806">CSS fires</text>
<text x="488" y="50" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#854F0B">.lit → background: yellow</text>

</svg>
